name: Repository Validation (Greybox)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install workspace dependencies
        run: npm ci
      - name: Verify formatting
        run: npm run format:check

  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify shared code is in sync
        run: node scripts/sync-templates.mjs --check

  playwright-template:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install workspace dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: templates/playwright-template
        run: npx playwright install --with-deps chromium

      - name: Run lint, types, and Playwright tests
        working-directory: templates/playwright-template
        env:
          TEST_ENV: dev
          TEST_RUN_ID: ci
        run: bash ./scripts/run-tests.sh

      - name: Generate Allure report
        if: always()
        working-directory: templates/playwright-template
        run: npm run report:allure

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-template-artifacts
          path: |
            templates/playwright-template/reports
            templates/playwright-template/allure-results
            templates/playwright-template/test-results

  playwright-template-docker:
    runs-on: ubuntu-latest
    env:
      DEV_APP_USERNAME: ci-docker-user
      DEV_APP_PASSWORD: ci-docker-password-A1!
      UI_DEMO_USERNAME: ci-docker-user
      UI_DEMO_PASSWORD: ci-docker-password-A1!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install workspace dependencies
        run: npm ci

      - name: Start API demo server
        run: npm run dev --workspace @toolstackhq/api-demo-server &

      - name: Start UI demo app
        run: npm run dev --workspace @toolstackhq/ui-demo-app &

      - name: Wait for demo services
        run: |
          for target in http://127.0.0.1:3000/health http://127.0.0.1:3001/health; do
            until curl --silent --fail "$target" >/dev/null; do
              sleep 1
            done
          done

      - name: Prepare Docker artifacts directories
        run: |
          rm -rf templates/playwright-template/reports templates/playwright-template/test-results templates/playwright-template/allure-results
          mkdir -p templates/playwright-template/reports templates/playwright-template/test-results templates/playwright-template/allure-results

      - name: Build Playwright template Docker image
        run: docker build -t qa-patterns-playwright-template:ci -f templates/playwright-template/docker/Dockerfile templates/playwright-template

      - name: Run Playwright template inside Docker
        run: |
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -e TEST_ENV=dev \
            -e TEST_RUN_ID=ci-docker \
            -e DEV_UI_BASE_URL=http://host.docker.internal:3000 \
            -e DEV_API_BASE_URL=http://host.docker.internal:3001 \
            -e DEV_APP_USERNAME=${DEV_APP_USERNAME} \
            -e DEV_APP_PASSWORD=${DEV_APP_PASSWORD} \
            -e UI_DEMO_USERNAME=${UI_DEMO_USERNAME} \
            -e UI_DEMO_PASSWORD=${UI_DEMO_PASSWORD} \
            -v "${GITHUB_WORKSPACE}/templates/playwright-template/reports:/workspace/reports" \
            -v "${GITHUB_WORKSPACE}/templates/playwright-template/allure-results:/workspace/allure-results" \
            -v "${GITHUB_WORKSPACE}/templates/playwright-template/test-results:/workspace/test-results" \
            qa-patterns-playwright-template:ci

      - name: Generate Allure report
        if: always()
        working-directory: templates/playwright-template
        run: npm run report:allure

      - name: Upload Docker Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-template-docker-artifacts
          path: |
            templates/playwright-template/reports
            templates/playwright-template/allure-results
            templates/playwright-template/test-results

  cypress-template:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install template dependencies
        working-directory: templates/cypress-template
        run: npm ci

      - name: Run lint and typecheck
        working-directory: templates/cypress-template
        run: |
          npm run lint
          npm run typecheck

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: templates/cypress-template
          install: false
          start: npm run demo:ui
          wait-on: 'http://127.0.0.1:3000/health'
          command: npm run cy:run

      - name: Generate Cypress Allure report
        if: always()
        working-directory: templates/cypress-template
        run: npm run report:allure

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-template-artifacts
          path: |
            templates/cypress-template/reports
            templates/cypress-template/allure-results

  wdio-template:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install template dependencies
        working-directory: templates/wdio-template
        run: npm ci

      - name: Run WebdriverIO lint, typecheck, and tests
        working-directory: templates/wdio-template
        env:
          TEST_ENV: dev
          TEST_RUN_ID: ci
        run: bash ./scripts/run-tests.sh

      - name: Generate WebdriverIO Allure report
        if: always()
        working-directory: templates/wdio-template
        run: npm run report:allure

      - name: Upload WebdriverIO artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-template-artifacts
          if-no-files-found: ignore
          path: |
            templates/wdio-template/reports
            templates/wdio-template/allure-results
