name: MCP Server Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  mcp-server-handshake:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '24']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install workspace dependencies
        run: npm ci

      - name: Validate MCP stdio handshake
        working-directory: packages/mcp-server
        run: npm run validate

  mcp-server-packed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install workspace dependencies
        run: npm ci

      - name: Pack MCP server
        id: pack
        run: |
          TARBALL="$(npm pack --workspace @toolstackhq/testkit-mcp | tail -n 1)"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Install packed MCP server
        run: npm install --prefix /tmp/testkit-mcp-install "./${{ steps.pack.outputs.tarball }}"

      - name: Validate packed MCP handshake
        working-directory: packages/mcp-server
        env:
          QA_PATTERNS_MCP_COMMAND: /tmp/testkit-mcp-install/node_modules/.bin/testkit-mcp
          QA_PATTERNS_MCP_ARGS: '[]'
          QA_PATTERNS_MCP_CWD: /tmp
        run: npm run validate
