name: Release Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CLI package verification
        run: npm run test --workspace @toolstackhq/create-testkit

      - name: Validate tag version matches CLI package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION=$(node -p "require('./tools/create-testkit/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match CLI package.json ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Pack npm artifact
        run: npm pack --workspace @toolstackhq/create-testkit

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --workspace @toolstackhq/create-testkit --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            testkit CLI release ${{ github.ref_name }}.
          files: |
            *.tgz

  publish-mcp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run MCP package verification
        working-directory: packages/mcp-server
        run: npm run validate

      - name: Validate tag version matches MCP package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match MCP package.json ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Pack MCP npm artifact
        run: npm pack --workspace @toolstackhq/testkit-mcp

      - name: Publish MCP to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --workspace @toolstackhq/testkit-mcp --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
