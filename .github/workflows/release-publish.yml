name: Release Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CLI package verification
        run: npm run test --workspace @toolstackhq/create-test-framework-patterns

      - name: Validate tag version matches CLI package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION=$(node -p "require('./tools/create-test-framework-patterns/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match CLI package.json ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Pack npm artifact
        run: npm pack --workspace @toolstackhq/create-test-framework-patterns

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --workspace @toolstackhq/create-test-framework-patterns --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            test-framework-patterns CLI release ${{ github.ref_name }}.
          files: |
            *.tgz
